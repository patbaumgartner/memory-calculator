version: 2
updates:
- package-ecosystem: gomod
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  open-pull-requests-limit: 10
  reviewers:
  - patbaumgartner
  assignees:
  - patbaumgartner
  commit-message:
    prefix: deps
    prefix-development: deps-dev
    include: scope
  labels:
  - dependencies
  - go
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  open-pull-requests-limit: 5
  reviewers:
  - patbaumgartner
  assignees:
  - patbaumgartner
  commit-message:
    prefix: ci
    include: scope
  labels:
  - dependencies
  - github-actions
- package-ecosystem: docker
  directory: /
  schedule:
    interval: weekly
    day: monday
    time: 06:00
    timezone: Europe/Zurich
  open-pull-requests-limit: 5
  reviewers:
  - patbaumgartner
  assignees:
  - patbaumgartner
  commit-message:
    prefix: docker
    include: scope
  labels:
  - dependencies
  - docker
